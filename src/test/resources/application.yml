quarkus:
  http:
    port: 0
    test-port: 0
    limits:
      max-body-size: ${floci.max-request-size}M

floci:
  base-url: "http://localhost:4566"
  default-region: us-east-1
  default-account-id: "000000000000"
  storage:
    mode: memory
    persistent-path: ./target/test-data
    wal:
      compaction-interval-ms: 60000
    services:
      ssm:
        flush-interval-ms: 60000
      dynamodb:
        flush-interval-ms: 60000
      sns:
        flush-interval-ms: 60000
      lambda:
        flush-interval-ms: 60000
      cloudwatchlogs:
        flush-interval-ms: 60000
      cloudwatchmetrics:
        flush-interval-ms: 60000
      secretsmanager:
        flush-interval-ms: 60000
      acm:
        flush-interval-ms: 60000
      opensearch:
        flush-interval-ms: 60000

  auth:
    validate-signatures: false
    presign-secret: test-secret

  init-hooks:
    shell-executable: /bin/sh
    timeout-seconds: 5
    shutdown-grace-period-seconds: 2

  docker:
    log-max-size: "10m"
    log-max-file: "3"

  services:
    ssm:
      enabled: true
      max-parameter-history: 5
    sqs:
      enabled: true
      default-visibility-timeout: 30
      max-message-size: 262144
    s3:
      enabled: true
      default-presign-expiry-seconds: 3600
    dynamodb:
      enabled: true
    sns:
      enabled: true
    lambda:
      enabled: true
      # aws-config-path:
      hot-reload:
        enabled: true
    apigateway:
      enabled: true
    apigatewayv2:
      enabled: true
    iam:
      enabled: true
      enforcement-enabled: false
    msk:
      enabled: true
      mock: true
      default-image: "redpandadata/redpanda:latest"
    elasticache:
      enabled: true
      proxy-base-port: 6379
      proxy-max-port: 6399
      default-image: "valkey/valkey:8"
    rds:
      enabled: true
      proxy-base-port: 7001
      proxy-max-port: 7099
      default-postgres-image: "postgres:16-alpine"
      default-mysql-image: "mysql:8.0"
      default-mariadb-image: "mariadb:11"
    eventbridge:
      enabled: true
    scheduler:
      enabled: true
    cloudwatchlogs:
      enabled: true
      max-events-per-query: 10000
    cloudwatchmetrics:
      enabled: true
    secretsmanager:
      enabled: true
      default-recovery-window-days: 30
    kinesis:
      enabled: true
    firehose:
      enabled: true
    kms:
      enabled: true
    cognito:
      enabled: true
    stepfunctions:
      enabled: true
    cloudformation:
      enabled: true
    acm:
      enabled: true
      validation-wait-seconds: 0
    athena:
      enabled: true
      mock: true
    glue:
      enabled: true
    ses:
      enabled: true
    opensearch:
      enabled: true
      mock: true
      default-image: "opensearchproject/opensearch:2"
      proxy-base-port: 9400
      proxy-max-port: 9499
    ec2:
      enabled: true
      imds-port: 9169
      ssh-port-range-start: 2200
      ssh-port-range-end: 2299
      mock: true
    ecs:
      enabled: true
      mock: true
    appconfig:
      enabled: true
    appconfigdata:
      enabled: true
    ecr:
      enabled: true
    bedrock-runtime:
      enabled: true
    eks:
      enabled: true
      mock: true
    pipes:
      enabled: true
    elbv2:
      enabled: true
      mock: true
    codebuild:
      enabled: true
      # docker-network: floci-network
    codedeploy:
      enabled: true
    autoscaling:
      enabled: true
    route53:
      enabled: true
