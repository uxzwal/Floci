name: CI

on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'pom.xml'
      - 'docs/services/**'
      - 'tools/docs/**'
      - 'Makefile'
      - '.github/workflows/ci.yml'
  pull_request:
    paths:
      - 'src/**'
      - 'pom.xml'
      - 'docs/services/**'
      - 'tools/docs/**'
      - 'Makefile'
      - '.github/workflows/ci.yml'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Build and Test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Run tests
        run: mvn test -B

  docs-sync:
    name: Docs in sync with handlers
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Install tooling deps
        run: pip install -r tools/docs/requirements.txt

      - name: Run docs tooling tests
        run: make docs-test

      - name: Verify docs match handler source
        run: make docs-check
